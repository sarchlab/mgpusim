name: MGPUSim Test

on: [push, pull_request]

jobs:
  compile:
    name: Compile
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Build
        run: go build ./...

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Install mockgen
        run: go install go.uber.org/mock/mockgen@v0.6.0

      - name: Generate mocks
        run: go generate ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: "v2.11.2"
          # Build golangci-lint with the configured Go toolchain to avoid
          # Go version mismatch (linter built with older Go than target).
          install-mode: binary
          args: --timeout=10m
          skip-cache: true

  unit_test:
    name: Unit Test
    runs-on: self-hosted
    needs: [compile, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Install mockgen
        run: go install go.uber.org/mock/mockgen@v0.6.0

      - name: Generate mocks
        run: go generate ./...

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo

      - name: Unit Test
        run: ginkgo -r --skip-package=mccl

  deterministicity_test:
    name: Deterministicity Test
    runs-on: self-hosted
    needs: [unit_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: List Directory Contents
        run: ls -R

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Check Python
        run: python3 --version

      - name: Run Deterministicity Test
        run: python test.py
        working-directory: amd/tests/deterministic/

  disassembler_test:
    name: Disassembler Test (GFX942)
    runs-on: self-hosted
    needs: [compile]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Run Disassembler Test
        run: ./test-disasm.sh --check
        working-directory: amd/benchmarks/amdappsdk/vectoradd/native/

  # =============================================================================
  # GCN3 (R9Nano) Tests
  # =============================================================================

  gcn3_emu_test:
    name: GCN3 Emulation Test
    runs-on: self-hosted
    needs: [unit_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Run GCN3 Emulation Test
        timeout-minutes: 60
        run: |
          go build
          ./acceptance -num-gpu=1 -no-timing -arch=gcn3
        working-directory: amd/tests/acceptance/

  gcn3_single_gpu_timing_test:
    name: GCN3 Single GPU Timing Test
    runs-on: self-hosted
    needs: [gcn3_emu_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Run GCN3 Single GPU Timing Test
        timeout-minutes: 60
        run: |
          go build
          ./acceptance -num-gpu=1 -arch=gcn3
        working-directory: amd/tests/acceptance/

  # =============================================================================
  # CDNA3 (MI300A) Tests
  # =============================================================================

  cdna3_emu_test:
    name: CDNA3 Emulation Test
    runs-on: self-hosted
    needs: [unit_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Run CDNA3 Emulation Test
        timeout-minutes: 60
        run: |
          go build
          ./acceptance -num-gpu=1 -no-timing -arch=cdna3
        working-directory: amd/tests/acceptance/

  cdna3_single_gpu_timing_test:
    name: CDNA3 Single GPU Timing Test
    runs-on: self-hosted
    needs: [cdna3_emu_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Install build dependencies
        run: |
          if command -v dnf &>/dev/null; then
            sudo dnf install -y gcc || echo "WARNING: sudo failed, gcc may already be installed"
          fi

      - name: Run CDNA3 Single GPU Timing Test
        timeout-minutes: 60
        run: |
          go build
          ./acceptance -num-gpu=1 -arch=cdna3
        working-directory: amd/tests/acceptance/
